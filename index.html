            <!--Tela de Game Over-->

            </div>

    <body>

             <button id="optionsBtn" class="menu-button">Opções</button>
         </div>
        

<!--Menu de opções-->
        <div id="optionsMenu" style="display: none;">
            <h2>Opções</h2>
            <label for="volumeSlider">Volume:</label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">

            <button id="backToMenuBtn" class="menu-button">Voltar</button>
